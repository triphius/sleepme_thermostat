name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install ruff==0.8.4 black==24.10.0
      - name: ruff check
        run: ruff check .
      - name: black --check
        run: black --check custom_components tests

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install mypy==1.13.0
      - run: pip install -r requirements_test.txt
      - name: mypy (advisory in Phase 0)
        # `|| true` keeps the job green while we adopt mypy. Drop the suffix in Phase 4.
        run: mypy custom_components/sleepme_thermostat || true

  pytest:
    name: pytest (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ha-version: ["2026.5"]
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements_test.txt
      - run: pytest --cov --cov-report=term-missing
